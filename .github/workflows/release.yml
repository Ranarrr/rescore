name: release

# Build the GUI (rescore) and the CLI (rescore-cli) on Windows, macOS, and Linux
# and attach the binaries to a GitHub Release. Triggered by pushing a version tag
# (e.g. v0.1.0), or manually (workflow_dispatch) to validate the builds without
# publishing a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            gui_asset: rescore-windows-x86_64.zip
            cli_asset: rescore-cli-windows-x86_64.zip
          - os: ubuntu-latest
            gui_asset: rescore-linux-x86_64.tar.gz
            cli_asset: rescore-cli-linux-x86_64.tar.gz
          - os: macos-latest
            gui_asset: rescore-macos-arm64.dmg
            cli_asset: rescore-cli-macos-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install GUI build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libgl1-mesa-dev libgtk-3-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DRESCORE_BUILD_GUI=ON
          -DRESCORE_BUILD_TESTS=OFF
          -DRESCORE_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/Release/rescore.exe     -DestinationPath ${{ matrix.gui_asset }}
          Compress-Archive -Path build/bin/Release/rescore-cli.exe -DestinationPath ${{ matrix.cli_asset }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.gui_asset }}" -C build/bin rescore
          tar -czf "${{ matrix.cli_asset }}" -C build/bin rescore-cli

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname Rescore -srcfolder build/bin/rescore.app -ov -format UDZO "${{ matrix.gui_asset }}"
          tar -czf "${{ matrix.cli_asset }}" -C build/bin rescore-cli

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            ${{ matrix.gui_asset }}
            ${{ matrix.cli_asset }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Rescore ${{ github.ref_name }}" \
            --generate-notes \
            $(find dist -type f)
